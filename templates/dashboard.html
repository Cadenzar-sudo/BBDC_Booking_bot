<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
</head>
<body class="bg-gray-100 min-h-screen flex justify-center py-10">

<div class="bg-white shadow-xl rounded-xl p-8 w-11/12 max-w-6xl">
  <h1 class="text-3xl font-semibold mb-6 text-gray-800">Dashboard</h1>

  <div class="flex gap-4 mb-4">
    <button id="addRowBtn" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
      + Add Row
    </button>
    <button id="saveBtn" class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700">
      💾 Save
    </button>
  </div>

  <div class="overflow-x-auto">
    <table id="dataTable" class="min-w-full text-left border-collapse table-fixed">
      <thead class="bg-gray-200 text-gray-700">
        <tr>
          <th class="p-3">Username</th>
          <th class="p-3">Password</th>
          <th class="p-3 w-32">Start Times</th>
          <th class="p-3">Target Months</th>
          <th class="p-3">Settings</th>
          <th class="p-3 px-8">Description</th>
          <th class="p-3">Actions</th>
        </tr>
      </thead>

      <tbody class="divide-y divide-gray-200">
        <!-- Rows injected dynamically -->
      </tbody>
    </table>
  </div>
</div>

<script id="data" type="application/json">
    {{ jobs_json | tojson }}
</script>

<script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
</body>
</html>
